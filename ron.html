<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ron — EduAsk AI Educational Advisor</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ron Page Specific Styles */
        .ron-page {
            background-color: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 100px auto 40px;
            width: 95%;
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        .chat-header {
            padding: 24px;
            background: var(--primary-blue);
            color: white;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ron-avatar {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-header-info h2 {
            font-size: 1.25rem;
            margin-bottom: 4px;
        }

        .chat-header-info p {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 400px;
            max-height: 60vh;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: messageFadeIn 0.3s ease forwards;
        }

        @keyframes messageFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-ron {
            align-self: flex-start;
            background: var(--bg-light);
            color: var(--text-dark);
            border-bottom-left-radius: 2px;
        }

        .message-user {
            align-self: flex-end;
            background: var(--primary-blue);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message-label {
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 12px;
            background: var(--bg-white);
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary-blue);
        }

        .send-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-btn:hover {
            background: var(--secondary-blue);
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 16px;
            background: var(--bg-light);
            border-radius: var(--radius-md);
            display: none;
            align-items: center;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-grey);
            border-radius: 50%;
            animation: dotWave 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotWave {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-4px);
            }
        }

        @media (max-width: 768px) {
            .chat-container {
                margin-top: 80px;
                height: calc(100vh - 100px);
                border-radius: 0;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>

<body class="ron-page">

    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="index.html" class="navbar-logo">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
                    <path d="M20 2L2 11L20 20L38 11L20 2Z" fill="url(#logo-grad1)" />
                    <path d="M2 11V26L20 35V20L2 11Z" fill="url(#logo-grad2)" />
                    <path d="M38 11V26L20 35V20L38 11Z" fill="url(#logo-grad3)" />
                    <path d="M20 11L11 15.5L20 20L29 15.5L20 11Z" fill="#FFFFFF" opacity="0.4" />
                    <defs>
                        <linearGradient id="logo-grad1" x1="2" y1="2" x2="38" y2="20" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FFFFFF" />
                            <stop offset="1" stop-color="#FDE047" />
                        </linearGradient>
                        <linearGradient id="logo-grad2" x1="2" y1="11" x2="20" y2="35" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#A78BFA" />
                            <stop offset="1" stop-color="#7C3AED" />
                        </linearGradient>
                        <linearGradient id="logo-grad3" x1="20" y1="11" x2="38" y2="35" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#F472B6" />
                            <stop offset="1" stop-color="#DB2777" />
                        </linearGradient>
                    </defs>
                </svg>
                <span class="logo-text">Edu<span class="logo-highlight">Ask</span></span>
            </a>
            <ul class="navbar-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#courses">Courses</a></li>
                <li><a href="certifications.html">Certifications</a></li>
                <li><a href="index.html#what-is">Universities</a></li>
                <li><a href="index.html#why-choose">About</a></li>
            </ul>
        </div>
    </nav>

    <main class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="ron-avatar">🤖</div>
            <div class="chat-header-info">
                <h2>Ron — AI Educational Advisor</h2>
                <p>EduAsk's intelligent student counselor</p>
            </div>
        </header>

        <!-- Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be injected here -->
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="userInput" class="chat-input"
                placeholder="Ask Ron anything about colleges, courses, exams, or career options" autocomplete="off">
            <button id="sendBtn" class="send-btn">
                <span>Send</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </main>

    <script src="ron.js"></script>
</body>

</html>
